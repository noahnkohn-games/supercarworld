<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperCar World - Multiplayer P2P Teste</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 20, 22, 0.9); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); width: 320px; text-align: center;
        }
        h1 { color: #e67e22; font-size: 24px; margin-top: 0; }
        input {
            width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px;
            border: 1px solid #455a64; background: #263238; color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px; transition: 0.2s;
        }
        .btn-host { background: #27ae60; color: white; }
        .btn-host:hover { background: #2ecc71; }
        .btn-join { background: #2980b9; color: white; }
        .btn-join:hover { background: #3498db; }
        
        #status-msg { margin-top: 15px; font-size: 14px; color: #f1c40f; font-weight: bold; word-break: break-all;}
        #hud { position: absolute; bottom: 20px; left: 20px; z-index: 5; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; display: none;}
        
        #room-id-display {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5;
            background: rgba(0, 0, 0, 0.75); padding: 10px 20px; border-radius: 20px;
            font-weight: bold; color: #f1c40f; border: 2px solid #e67e22;
            font-family: monospace; font-size: 14px; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); user-select: all;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="room-id-display"></div>

    <div id="ui-layer">
        <div class="menu-box">
            <h1>Multiplayer Otimizado (1.0.2)</h1>
            <input type="text" id="player-name" value="Piloto" placeholder="Seu Nome">
            
            <button class="btn-host" onclick="createRoom()">1. CRIAR SALA (HOST)</button>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <input type="text" id="room-id" placeholder="Cole o ID da Sala aqui">
            <button class="btn-join" onclick="joinRoom()">2. ENTRAR NA SALA</button>

            <div id="status-msg"></div>
        </div>
    </div>

    <div id="hud">Velocidade: <span id="speed">0</span> km/h</div>
    <div id="canvas-container"></div>

    <script>
        let peer = null;
        let isHost = false;
        let myId = null;
        let hostConnection = null;
        let clientConnections = [];
        
        let myName = "";
        let myColor = Math.random() * 0xffffff;
        let players = {};
        
        let mySpeed = 0;
        let myRotation = 0;
        let myX = 0;
        let myZ = 0;
        const keys = {};

        // Variáveis de controle de Tempo e Rede
        let lastFrameTime = 0;
        let lastNetworkSend = 0;
        const NETWORK_TICK_RATE = 50; 

        // --- SETUP GRÁFICO (THREE.JS) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfffaf0, 1.0); sunLight.position.set(100, 200, 50); scene.add(sunLight);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2f7d3b }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        for(let x = -200; x <= 200; x+= 40) {
            for(let z = -200; z <= 200; z+= 40) {
                if(Math.abs(x) < 20 && Math.abs(z) < 20) continue;
                let building = new THREE.Mesh(
                    new THREE.BoxGeometry(25, Math.random() * 20 + 10, 25), 
                    new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                );
                building.position.set(x, building.geometry.parameters.height/2, z);
                scene.add(building);
            }
        }

        function createCarMesh(colorHex) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 4), new THREE.MeshStandardMaterial({ color: colorHex }));
            body.position.y = 0.5;
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 2), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            cabin.position.set(0, 0.9, -0.2);
            group.add(body, cabin);
            scene.add(group);
            return group;
        }

        // --- LÓGICA MULTIPLAYER (PEERJS) ---
        function setStatus(msg) {
            document.getElementById('status-msg').innerText = msg;
        }

        function startGameEngine() {
            console.log("[GERAL] Iniciando engine gráfica...");
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            const topDisplay = document.getElementById('room-id-display');
            if (isHost) {
                topDisplay.innerText = `ID DA SALA (HOST): ${myId}`;
            } else {
                const hostId = document.getElementById('room-id').value;
                topDisplay.innerText = `SALA: ${hostId} (CONECTADO)`;
            }
            topDisplay.style.display = 'block';
            
            players[myId] = {
                name: myName, color: myColor, 
                x: 0, z: 0, rotation: 0, 
                targetX: 0, targetZ: 0, targetRotation: 0,
                mesh: createCarMesh(myColor)
            };
            
            requestAnimationFrame(animate);
        }

        // --- LÓGICA DO HOST ---
        function createRoom() {
            myName = document.getElementById('player-name').value || "Host";
            setStatus("Criando sala, aguarde...");
            console.log("[HOST] Tentando conectar ao servidor PeerJS para criar sala...");
            
            peer = new Peer();
            
            peer.on('disconnected', function() {
                console.warn("[HOST] Desconectado do servidor PeerJS. Tentando reconectar...");
                peer.reconnect(); 
            });
            
            peer.on('open', function(id) {
                myId = id;
                isHost = true;
                console.log("[HOST] Sala criada! ID:", id);
                startGameEngine();
            });

            peer.on('connection', function(conn) {
                console.log(`[HOST] Nova conexão recebida de: ${conn.peer}`);
                clientConnections.push(conn);
                
                conn.on('open', function() {
                    console.log(`[HOST] Conexão aberta com cliente: ${conn.peer}`);
                });

                conn.on('data', function(data) {
                    if(data.type === 'join') {
                        console.log(`[HOST] Cliente Entrou: ${data.name} (${data.id})`);
                        players[data.id] = { 
                            name: data.name, color: data.color, 
                            x: 0, z: 0, rotation: 0, 
                            targetX: 0, targetZ: 0, targetRotation: 0,
                            mesh: createCarMesh(data.color) 
                        };
                    } 
                    else if (data.type === 'update') {
                        if(players[data.id]) {
                            players[data.id].targetX = data.x;
                            players[data.id].targetZ = data.z;
                            players[data.id].targetRotation = data.rotation;
                        }
                    }
                });

                conn.on('close', function() {
                    console.log(`[HOST] Cliente ${conn.peer} desconectou.`);
                    clientConnections = clientConnections.filter(c => c.peer !== conn.peer);
                    if(players[conn.peer] && players[conn.peer].mesh) scene.remove(players[conn.peer].mesh);
                    delete players[conn.peer];
                });

                conn.on('error', function(err) {
                    console.error(`[HOST] Erro com o cliente ${conn.peer}:`, err);
                });
            });

            peer.on('error', function(err) { 
                console.error("[HOST] Erro PeerJS:", err);
                setStatus("Erro: " + err.type); 
            });
        }

        // --- LÓGICA DO CLIENTE ---
        function joinRoom() {
            const hostId = document.getElementById('room-id').value.trim();
            if(!hostId) return setStatus("Digite o ID!");
            
            myName = document.getElementById('player-name').value || "Convidado";
            setStatus("Conectando...");
            console.log(`[CLIENTE] Tentando conectar na sala: ${hostId}`);
            
            peer = new Peer();
            
            peer.on('disconnected', function() {
                console.warn("[CLIENTE] Desconectado do PeerJS. Tentando reconectar...");
                peer.reconnect(); 
            });
            
            peer.on('open', function(id) {
                myId = id;
                console.log(`[CLIENTE] Conectado ao servidor PeerJS. ID local: ${myId}`);
                console.log(`[CLIENTE] Solicitando conexão com o Host...`);
                
                hostConnection = peer.connect(hostId, { reliable: true });
                
                hostConnection.on('open', function() {
                    console.log("[CLIENTE] Conexão com Host ABERTA!");
                    setStatus("Conectado!");
                    hostConnection.send({ type: 'join', id: myId, name: myName, color: myColor });
                    startGameEngine();
                });

                hostConnection.on('data', function(state) {
                    if(state.type === 'stateUpdate') syncWorldState(state.playersData);
                });
                
                hostConnection.on('close', function() {
                    console.warn("[CLIENTE] Host fechou a sala.");
                    alert("O Host fechou a sala!");
                    window.location.reload();
                });

                hostConnection.on('error', function(err) {
                    console.error("[CLIENTE] Erro na conexão direta com o Host:", err);
                    setStatus("Erro de conexão com o Host.");
                });
            });

            peer.on('error', function(err) { 
                console.error("[CLIENTE] Erro no PeerJS:", err);
                if (err.type === 'peer-unavailable') {
                    setStatus("Sala não encontrada. O Host fechou ou o ID está errado.");
                } else {
                    setStatus("Erro: " + err.type); 
                }
            });
        }

        function syncWorldState(serverPlayers) {
            for (let id in serverPlayers) {
                if (id === myId) continue;
                let sp = serverPlayers[id];
                
                if (!players[id]) {
                    console.log(`[CLIENTE] Criando carro do jogador: ${sp.name} (${id})`);
                    players[id] = { 
                        name: sp.name, color: sp.color, 
                        x: sp.x, z: sp.z, rotation: sp.rotation,
                        targetX: sp.x, targetZ: sp.z, targetRotation: sp.rotation,
                        mesh: createCarMesh(sp.color) 
                    };
                } else {
                    players[id].targetX = sp.x;
                    players[id].targetZ = sp.z;
                    players[id].targetRotation = sp.rotation;
                }
            }
            
            for (let id in players) {
                if (id !== myId && !serverPlayers[id]) {
                    console.log(`[CLIENTE] Removendo jogador: ${players[id].name}`);
                    scene.remove(players[id].mesh);
                    delete players[id];
                }
            }
        }

        // --- FÍSICA E ANIMAÇÃO ---
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updatePhysics(dtMod) {
            if (keys['KeyW'] || keys['ArrowUp']) mySpeed += 0.01 * dtMod;
            else if (keys['KeyS'] || keys['ArrowDown']) mySpeed -= 0.01 * dtMod;
            else {
                mySpeed -= Math.sign(mySpeed) * 0.005 * dtMod;
                if(Math.abs(mySpeed) < 0.006) mySpeed = 0;
            }
            
            if(mySpeed > 0.8) mySpeed = 0.8;
            if(mySpeed < -0.4) mySpeed = -0.4;

            if (Math.abs(mySpeed) > 0) {
                let mod = mySpeed > 0 ? 1 : -1;
                if (keys['KeyA'] || keys['ArrowLeft']) myRotation += 0.03 * mod * dtMod;
                if (keys['KeyD'] || keys['ArrowRight']) myRotation -= 0.03 * mod * dtMod;
            }

            myX += Math.sin(myRotation) * mySpeed * dtMod;
            myZ += Math.cos(myRotation) * mySpeed * dtMod;

            if(players[myId]) {
                players[myId].x = myX;
                players[myId].z = myZ;
                players[myId].rotation = myRotation;
            }
            
            document.getElementById('speed').innerText = Math.floor(Math.abs(mySpeed) * 300);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            if (!lastFrameTime) lastFrameTime = time;
            let deltaTime = (time - lastFrameTime) / 1000;
            lastFrameTime = time;
            
            if (deltaTime > 0.1) deltaTime = 0.1; 
            let dtMod = deltaTime * 60; 

            updatePhysics(dtMod);

            for (let id in players) {
                let p = players[id];
                if (!p.mesh) continue;

                if (id === myId) {
                    p.mesh.position.x = p.x;
                    p.mesh.position.z = p.z;
                    p.mesh.rotation.y = p.rotation;
                } else {
                    p.x += (p.targetX - p.x) * 0.2 * dtMod;
                    p.z += (p.targetZ - p.z) * 0.2 * dtMod;
                    
                    let diff = p.targetRotation - p.rotation;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    p.rotation += diff * 0.2 * dtMod;

                    p.mesh.position.x = p.x;
                    p.mesh.position.z = p.z;
                    p.mesh.rotation.y = p.rotation;
                }
            }

            if(players[myId] && players[myId].mesh) {
                const myCar = players[myId].mesh;
                const offset = new THREE.Vector3(-Math.sin(myRotation) * 12, 6, -Math.cos(myRotation) * 12);
                camera.position.copy(myCar.position).add(offset);
                camera.lookAt(myCar.position);
            }

            if (time - lastNetworkSend > NETWORK_TICK_RATE) {
                lastNetworkSend = time;
                
                if (isHost) {
                    let statePayload = {};
                    for(let id in players) {
                        statePayload[id] = { 
                            name: players[id].name, color: players[id].color, 
                            x: (id === myId) ? players[id].x : players[id].targetX, 
                            z: (id === myId) ? players[id].z : players[id].targetZ, 
                            rotation: (id === myId) ? players[id].rotation : players[id].targetRotation 
                        };
                    }
                    clientConnections.forEach(conn => {
                        if(conn.open) conn.send({ type: 'stateUpdate', playersData: statePayload });
                    });
                } else if (hostConnection && hostConnection.open) {
                    hostConnection.send({ type: 'update', id: myId, x: myX, z: myZ, rotation: myRotation });
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
