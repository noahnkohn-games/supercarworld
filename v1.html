<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperCar World - Multiplayer P2P Teste</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Menu Multiplayer */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 20, 22, 0.9); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-box {
            background: rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2); width: 320px; text-align: center;
        }
        h1 { color: #e67e22; font-size: 24px; margin-top: 0; }
        input {
            width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px;
            border: 1px solid #455a64; background: #263238; color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px; transition: 0.2s;
        }
        .btn-host { background: #27ae60; color: white; }
        .btn-host:hover { background: #2ecc71; }
        .btn-join { background: #2980b9; color: white; }
        .btn-join:hover { background: #3498db; }
        
        #status-msg { margin-top: 15px; font-size: 14px; color: #f1c40f; font-weight: bold; word-break: break-all;}
        
        #hud { position: absolute; bottom: 20px; left: 20px; z-index: 5; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; display: none;}
        #hud-instructions { color: #aaddff; font-size: 12px; margin-top: 5px; }
        #toast-msg { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #e74c3c; padding: 10px 20px; border-radius: 5px; display: none; z-index: 20; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <div class="menu-box">
            <h1>Multiplayer Teste (1.0.4)</h1>
            <input type="text" id="player-name" value="Piloto" placeholder="Seu Nome">
            
            <button class="btn-host" onclick="createRoom()">1. CRIAR SALA (HOST)</button>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <input type="text" id="room-id" placeholder="Cole o ID da Sala aqui">
            <button class="btn-join" onclick="joinRoom()">2. ENTRAR NA SALA</button>

            <div id="status-msg"></div>
        </div>
    </div>

    <div id="hud">
        <strong style="font-size: 18px;">Velocidade: <span id="speed">0</span> km/h</strong>
        <div id="hud-instructions"><b>[W A S D]</b> Mover &nbsp; | &nbsp; <b>[F]</b> Entrar/Sair do Carro &nbsp; | &nbsp; <b>[ESPAÇO]</b> Pular</div>
    </div>
    
    <div id="toast-msg">Mensagem de erro</div>

    <div id="canvas-container"></div>

    <script>
        // --- VARIÁVEIS DO JOGO E MULTIPLAYER ---
        let peer = null;
        let isHost = false;
        let myId = null;
        let hostConnection = null;
        let clientConnections = [];
        
        let myName = "";
        let myColor = Math.random() * 0xffffff;
        
        // Estado do jogo
        let players = {}; 
        
        // --- FÍSICA E CONTROLES LOCAIS ---
        let isInsideCar = true;
        const keys = {};

        // Carro
        let carSpeed = 0;
        let carRotation = 0;
        let carX = 0;
        let carZ = 0;

        // Boneco (Personagem)
        let charX = 0;
        let charY = 0; // Altura para o pulo
        let charZ = 0;
        let charRotation = 0;
        let charVY = 0; // Velocidade Vertical (gravidade/pulo)

        // --- SETUP DO THREE.JS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfffaf0, 1.0); sunLight.position.set(100, 200, 50); scene.add(sunLight);

        // Chão
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x2f7d3b }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- GERAÇÃO DE PRÉDIOS ---
        function createBuildingMaterials(baseColorHex) {
            const canvasSide = document.createElement('canvas');
            canvasSide.width = 128; canvasSide.height = 256;
            const ctxS = canvasSide.getContext('2d');
            ctxS.fillStyle = baseColorHex; ctxS.fillRect(0, 0, 128, 256);
            ctxS.fillStyle = '#aaddff'; 
            for (let y = 20; y < 220; y += 40) {
                for (let x = 14; x < 114; x += 30) {
                    ctxS.fillRect(x, y, 20, 25);
                }
            }
            const texSide = new THREE.CanvasTexture(canvasSide);

            const canvasFront = document.createElement('canvas');
            canvasFront.width = 128; canvasFront.height = 256;
            const ctxF = canvasFront.getContext('2d');
            ctxF.drawImage(canvasSide, 0, 0); 
            ctxF.fillStyle = '#2d1b00'; 
            ctxF.fillRect(44, 216, 40, 40); 
            const texFront = new THREE.CanvasTexture(canvasFront);

            const matSide = new THREE.MeshStandardMaterial({ map: texSide });
            const matFront = new THREE.MeshStandardMaterial({ map: texFront });
            const matTop = new THREE.MeshStandardMaterial({ color: baseColorHex });

            return [matSide, matSide, matTop, matTop, matFront, matSide];
        }

        for(let x = -200; x <= 200; x+= 40) {
            for(let z = -200; z <= 200; z+= 40) {
                if(Math.abs(x) < 20 && Math.abs(z) < 20) continue; 
                let colorHex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
                let building = new THREE.Mesh(
                    new THREE.BoxGeometry(25, Math.random() * 20 + 15, 25), 
                    createBuildingMaterials(colorHex)
                );
                building.position.set(x, building.geometry.parameters.height/2, z);
                scene.add(building);
            }
        }

        // --- MODELOS 3D (CARRO E BONECO) ---
        function createCarMesh(colorHex) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 4), new THREE.MeshStandardMaterial({ color: colorHex }));
            body.position.y = 0.5;
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 2), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            cabin.position.set(0, 0.9, -0.2);
            group.add(body, cabin);
            scene.add(group);
            return group;
        }

        function createCharacterMesh(colorHex) {
            const group = new THREE.Group();
            // Corpo
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1.2, 16), new THREE.MeshStandardMaterial({ color: colorHex }));
            body.position.y = 0.6;
            // Cabeça
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffe0bd })); // Cor de pele padrão
            head.position.y = 1.4;
            // Rosto (Oculoszinho para indicar a frente)
            const glasses = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.1, 0.1), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            glasses.position.set(0, 1.4, 0.28);

            group.add(body, head, glasses);
            scene.add(group);
            return group;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-msg');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // --- LÓGICA MULTIPLAYER (PEERJS) ---
        function setStatus(msg) {
            document.getElementById('status-msg').innerText = msg;
        }

        function startGameEngine() {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            // Adiciona você mesmo na lista de jogadores
            players[myId] = {
                name: myName, color: myColor, 
                isInsideCar: true,
                carX: 0, carZ: 0, carRot: 0,
                charX: 0, charY: 0, charZ: 0, charRot: 0,
                carMesh: createCarMesh(myColor),
                charMesh: createCharacterMesh(myColor)
            };
            
            animate(); 
        }

        // 1. O Jogador 1 (Host) clica aqui para criar a sala
        function createRoom() {
            myName = document.getElementById('player-name').value || "Host";
            setStatus("Criando sala, aguarde...");
            peer = new Peer(); 
            peer.on('open', function(id) {
                myId = id; isHost = true;
                setStatus(`SALA CRIADA!\nSeu ID é:\n${id}\n\nEnvie este ID para seu amigo.`);
                startGameEngine();
            });

            peer.on('connection', function(conn) {
                clientConnections.push(conn);
                conn.on('data', function(data) {
                    if(data.type === 'join') {
                        players[data.id] = { 
                            name: data.name, color: data.color, 
                            isInsideCar: true,
                            carX: 0, carZ: 0, carRot: 0,
                            charX: 0, charY: 0, charZ: 0, charRot: 0,
                            carMesh: null, charMesh: null 
                        };
                    } else if (data.type === 'update' && players[data.id]) {
                        // Recebe os dados físicos do cliente
                        const p = players[data.id];
                        p.isInsideCar = data.isInsideCar;
                        p.carX = data.carX; p.carZ = data.carZ; p.carRot = data.carRot;
                        p.charX = data.charX; p.charY = data.charY; p.charZ = data.charZ; p.charRot = data.charRot;
                    }
                });

                conn.on('close', function() {
                    clientConnections = clientConnections.filter(c => c.peer !== conn.peer);
                    if(players[conn.peer]) {
                        if(players[conn.peer].carMesh) scene.remove(players[conn.peer].carMesh);
                        if(players[conn.peer].charMesh) scene.remove(players[conn.peer].charMesh);
                        delete players[conn.peer];
                    }
                });
            });
        }

        // 2. O Jogador 2 (Cliente) cola o ID e clica aqui para entrar
        function joinRoom() {
            const hostId = document.getElementById('room-id').value;
            if(!hostId) return setStatus("Digite o ID da sala primeiro!");
            myName = document.getElementById('player-name').value || "Convidado";
            setStatus("Conectando ao Host...");
            
            peer = new Peer();
            peer.on('open', function(id) {
                myId = id;
                hostConnection = peer.connect(hostId);
                hostConnection.on('open', function() {
                    hostConnection.send({ type: 'join', id: myId, name: myName, color: myColor });
                    startGameEngine();
                });

                hostConnection.on('data', function(state) {
                    if(state.type === 'stateUpdate') syncWorldState(state.playersData);
                });
                
                hostConnection.on('close', function() {
                    alert("O Host fechou a sala!");
                    window.location.reload();
                });
            });
        }

        // Sincroniza a tela do cliente com o que o Host mandou
        function syncWorldState(serverPlayers) {
            for (let id in serverPlayers) {
                if (id === myId) continue; 
                let sp = serverPlayers[id];
                
                if (!players[id]) {
                    players[id] = { 
                        name: sp.name, color: sp.color, 
                        carMesh: createCarMesh(sp.color), charMesh: createCharacterMesh(sp.color) 
                    };
                }
                
                players[id].isInsideCar = sp.isInsideCar;
                players[id].carX = sp.carX; players[id].carZ = sp.carZ; players[id].carRot = sp.carRot;
                players[id].charX = sp.charX; players[id].charY = sp.charY; players[id].charZ = sp.charZ; players[id].charRot = sp.charRot;
            }
            
            // Remove quem saiu
            for (let id in players) {
                if (id !== myId && !serverPlayers[id]) {
                    scene.remove(players[id].carMesh);
                    scene.remove(players[id].charMesh);
                    delete players[id];
                }
            }
        }

        // --- CONTROLES E LOOP PRINCIPAL ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // Tecla F para alternar (Sair/Entrar do Carro)
            if (e.code === 'KeyF') {
                if (isInsideCar) {
                    // Sair do Carro (Joga o boneco um pouco pro lado da porta)
                    isInsideCar = false;
                    charX = carX + Math.cos(carRotation) * 2.5; 
                    charZ = carZ - Math.sin(carRotation) * 2.5;
                    charY = 0;
                    charRotation = carRotation;
                    carSpeed = 0; // Para o carro ao sair
                } else {
                    // Tentar Entrar no Carro
                    let distance = Math.hypot(charX - carX, charZ - carZ);
                    if (distance < 5) {
                        isInsideCar = true;
                    } else {
                        showToast("Você está muito longe do carro!");
                    }
                }
            }
        });

        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updatePhysics() {
            if (isInsideCar) {
                // --- FÍSICA DO CARRO ---
                if (keys['KeyW'] || keys['ArrowUp']) carSpeed += 0.01;
                else if (keys['KeyS'] || keys['ArrowDown']) carSpeed -= 0.01;
                else {
                    carSpeed -= Math.sign(carSpeed) * 0.005;
                    if(Math.abs(carSpeed) < 0.006) carSpeed = 0;
                }
                
                if(carSpeed > 0.8) carSpeed = 0.8;
                if(carSpeed < -0.4) carSpeed = -0.4;

                if (Math.abs(carSpeed) > 0) {
                    let mod = carSpeed > 0 ? 1 : -1;
                    if (keys['KeyA'] || keys['ArrowLeft']) carRotation += 0.03 * mod;
                    if (keys['KeyD'] || keys['ArrowRight']) carRotation -= 0.03 * mod;
                }

                carX += Math.sin(carRotation) * carSpeed;
                carZ += Math.cos(carRotation) * carSpeed;

                document.getElementById('speed').innerText = Math.floor(Math.abs(carSpeed) * 300);
            
            } else {
                // --- FÍSICA DO BONECO ---
                let walkSpeed = 0;
                if (keys['KeyW'] || keys['ArrowUp']) walkSpeed = 0.15;
                if (keys['KeyS'] || keys['ArrowDown']) walkSpeed = -0.15;

                if (keys['KeyA'] || keys['ArrowLeft']) charRotation += 0.08;
                if (keys['KeyD'] || keys['ArrowRight']) charRotation -= 0.08;

                charX += Math.sin(charRotation) * walkSpeed;
                charZ += Math.cos(charRotation) * walkSpeed;

                // Pulo
                if (keys['Space'] && charY === 0) {
                    charVY = 0.3; // Força do pulo
                }

                // Gravidade Aplicada ao Boneco
                if (charY > 0 || charVY !== 0) {
                    charVY -= 0.02; // Força da gravidade
                    charY += charVY;
                    
                    if (charY <= 0) { // Bateu no chão
                        charY = 0;
                        charVY = 0;
                    }
                }

                document.getElementById('speed').innerText = "A pé";
            }

            // Atualiza os dados locais do seu próprio player para renderização e rede
            if(players[myId]) {
                players[myId].isInsideCar = isInsideCar;
                players[myId].carX = carX; players[myId].carZ = carZ; players[myId].carRot = carRotation;
                players[myId].charX = charX; players[myId].charY = charY; players[myId].charZ = charZ; players[myId].charRot = charRotation;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            updatePhysics();

            // Renderiza e posiciona os modelos de todos os jogadores
            for (let id in players) {
                let p = players[id];

                // Atualiza o Carro
                if(p.carMesh) {
                    p.carMesh.position.set(p.carX, 0, p.carZ);
                    p.carMesh.rotation.y = p.carRot;
                }
                
                // Atualiza o Boneco
                if(p.charMesh) {
                    p.charMesh.position.set(p.charX, p.charY, p.charZ);
                    p.charMesh.rotation.y = p.charRot;
                    // Se o jogador estiver no carro, esconde o boneco
                    p.charMesh.visible = !p.isInsideCar; 
                }
            }

            // --- SISTEMA DE CÂMERA DINÂMICA ---
            if(players[myId]) {
                if (isInsideCar && players[myId].carMesh) {
                    // Câmera segue o carro
                    const offset = new THREE.Vector3(-Math.sin(carRotation) * 12, 6, -Math.cos(carRotation) * 12);
                    camera.position.copy(players[myId].carMesh.position).add(offset);
                    camera.lookAt(players[myId].carMesh.position);
                } else if (!isInsideCar && players[myId].charMesh) {
                    // Câmera segue o boneco mais de perto
                    const offset = new THREE.Vector3(-Math.sin(charRotation) * 5, 4, -Math.cos(charRotation) * 5);
                    const lookTarget = players[myId].charMesh.position.clone();
                    lookTarget.y += 1; // Olha para a cabeça do boneco
                    camera.position.copy(players[myId].charMesh.position).add(offset);
                    camera.lookAt(lookTarget);
                }
            }

            // --- REDE: ENVIO DE DADOS ---
            if (isHost) {
                let statePayload = {};
                for(let id in players) {
                    statePayload[id] = { 
                        name: players[id].name, color: players[id].color, 
                        isInsideCar: players[id].isInsideCar,
                        carX: players[id].carX, carZ: players[id].carZ, carRot: players[id].carRot,
                        charX: players[id].charX, charY: players[id].charY, charZ: players[id].charZ, charRot: players[id].charRot
                    };
                }
                clientConnections.forEach(conn => conn.send({ type: 'stateUpdate', playersData: statePayload }));
            } else if (hostConnection && hostConnection.open) {
                // Cliente envia pacote contendo posições do carro e do boneco
                hostConnection.send({ 
                    type: 'update', id: myId, 
                    isInsideCar: isInsideCar,
                    carX: carX, carZ: carZ, carRot: carRotation,
                    charX: charX, charY: charY, charZ: charZ, charRot: charRotation
                });
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
