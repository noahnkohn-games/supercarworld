<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperCar World - Colisões, Oceano e Ponte Real</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #111; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #1e272c 0%, #0f1416 100%); z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .menu-box {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); 
            width: 340px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { color: #e67e22; font-size: 22px; margin-top: 0; letter-spacing: 1px;}
        input {
            width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px;
            border: 1px solid #455a64; background: #263238; color: white; box-sizing: border-box; font-weight: bold;
        }
        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px; transition: 0.2s; text-transform: uppercase;
        }
        .btn-host { background: #27ae60; color: white; }
        .btn-host:hover { background: #2ecc71; transform: translateY(-2px);}
        .btn-join { background: #2980b9; color: white; }
        .btn-join:hover { background: #3498db; transform: translateY(-2px);}
        
        #status-msg { margin-top: 15px; font-size: 13px; color: #f1c40f; font-weight: bold; word-break: break-all;}
        
        #hud { 
            position: absolute; bottom: 20px; left: 20px; z-index: 5; 
            background: rgba(255,255,255,0.85); color: #333; padding: 12px 20px; 
            border-radius: 10px; border: 2px solid #ccc; display: none; font-weight: bold;
        }
        #hud small { display: block; margin-top: 8px; color: #d35400; font-size: 11px; text-transform: uppercase; }
        .hud-val { font-size: 20px; color: #2c3e50; }

        #room-id-display {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 5;
            background: rgba(15, 23, 30, 0.85); padding: 8px 18px; border-radius: 20px;
            font-weight: bold; color: #f1c40f; border: 2px solid #34495e;
            font-family: 'Courier New', monospace; font-size: 14px; display: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6); user-select: all; cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="room-id-display"></div>

    <div id="ui-layer">
        <div class="menu-box">
            <h1>SuperCar World (1.0.8.)</h1>
            <input type="text" id="player-name" value="Piloto Teste" placeholder="Digite seu Nome" maxlength="12">
            
            <button class="btn-host" onclick="createRoom()">1. Criar Sala (Host)</button>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <input type="text" id="room-id" placeholder="Cole o ID da Sala aqui">
            <button class="btn-join" onclick="joinRoom()">2. Entrar na Sala</button>

            <div id="status-msg"></div>
        </div>
    </div>

    <div id="hud">
        Velocidade: <span id="speed" class="hud-val">0</span> km/h
        <small>F - Entrar/Sair | ESPAÇO - Drift/Pular</small>
    </div>
    <div id="canvas-container"></div>

    <script>
        let peer = null;
        let isHost = false;
        let myId = null;
        let hostConnection = null;
        let clientConnections = [];
        
        let myName = "";
        let myColor = Math.floor(Math.random() * 16777215); 
        let players = {};
        
        // Estado Físico Local (Carro)
        let myIsDriving = true;
        let mySpeed = 0;
        let myRotation = 0;
        let myX = 0;
        let myZ = 0;
        let myCarY = 0;
        let myCarVelocityY = 0;
        
        // Posição Humana
        let myHumanX = 0;
        let myHumanY = 0; 
        let myHumanZ = 0;
        let myHumanRotation = 0;
        let myHumanVelocityY = 0; 

        // Sistema de Fumaça (Drift) e Colisões
        let driftSmokeParticles = [];
        const staticCollidables = []; // Lista de todos os prédios para colisão

        const keys = {};
        let lastFrameTime = 0;
        let lastNetworkSend = 0;
        const NETWORK_TICK_RATE = 50; 

        // --- SETUP GRÁFICO (THREE.JS) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfffaf0, 1.0); sunLight.position.set(150, 300, 100); scene.add(sunLight);

        // Chão Gigante
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(6000, 6000), new THREE.MeshStandardMaterial({ color: 0x2f7d3b }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- FUNÇÃO MATEMÁTICA DO CHÃO (OCEANO E PONTE) ---
        function getFloorHeight(x, z) {
            // Rampa da Cidade 1 subindo para a Ponte
            if (x >= 430 && x < 450 && z >= -20 && z <= 20) {
                return ((x - 430) / 20) * 1.0; 
            }
            // Rampa da Ponte descendo para a Cidade 2
            if (x > 1150 && x <= 1170 && z >= -20 && z <= 20) {
                return ((1170 - x) / 20) * 1.0;
            }
            // Corpo da Ponte
            if (x >= 450 && x <= 1150 && z >= -20 && z <= 20) {
                return 1.0;
            }
            // Caiu da ponte ou entrou no mar? Afunda!
            if (x >= 430 && x <= 1170) {
                return -1.5;
            }
            // Chão firme das cidades
            return 0;
        }

        // --- VERIFICADOR DE COLISÃO ---
        function checkCollision(newX, newZ, radius) {
            for (let i = 0; i < staticCollidables.length; i++) {
                let box = staticCollidables[i];
                // Encontra o ponto do quadrado mais próximo ao círculo do jogador/carro
                let closestX = Math.max(box.xMin, Math.min(newX, box.xMax));
                let closestZ = Math.max(box.zMin, Math.min(newZ, box.zMax));
                
                // Calcula se bateu
                if (((newX - closestX)**2 + (newZ - closestZ)**2) < (radius * radius)) {
                    return true;
                }
            }
            return false;
        }

        // --- ENGENHARIA DE DUAS CIDADES, QUADRAS E PONTES ---
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.8 });
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
        const colors = [0xd1d1d1, 0xa3a3a3, 0xc48474, 0x617585, 0xe3dec9, 0xf6d6ad];

        function createBuilding(x, z, bWidth, bDepth) {
            const group = new THREE.Group();
            const bHeight = Math.random() * 25 + 15;
            const bColor = colors[Math.floor(Math.random() * colors.length)];
            
            const building = new THREE.Mesh(new THREE.BoxGeometry(bWidth, bHeight, bDepth), new THREE.MeshStandardMaterial({ color: bColor }));
            building.position.y = bHeight / 2;
            group.add(building);

            // Porta do Prédio
            const door = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 0.5), doorMat);
            door.position.set(0, 2.5, bDepth / 2 + 0.1);
            group.add(door);

            // Grandes Janelas de Vidro
            const gW = bWidth - 8;
            const gH = bHeight - 10;
            
            const glassF = new THREE.Mesh(new THREE.BoxGeometry(gW, gH, 0.2), glassMat);
            glassF.position.set(0, bHeight/2 + 2, bDepth/2 + 0.1);
            const glassB = new THREE.Mesh(new THREE.BoxGeometry(gW, gH, 0.2), glassMat);
            glassB.position.set(0, bHeight/2 + 2, -bDepth/2 - 0.1);
            const glassL = new THREE.Mesh(new THREE.BoxGeometry(0.2, gH, bDepth - 8), glassMat);
            glassL.position.set(-bWidth/2 - 0.1, bHeight/2 + 2, 0);
            const glassR = new THREE.Mesh(new THREE.BoxGeometry(0.2, gH, bDepth - 8), glassMat);
            glassR.position.set(bWidth/2 + 0.1, bHeight/2 + 2, 0);
            
            group.add(glassF, glassB, glassL, glassR);
            group.position.set(x, 0.2, z); 
            scene.add(group);

            // REGISTRA A COLISÃO DO PRÉDIO
            staticCollidables.push({
                xMin: x - bWidth/2, xMax: x + bWidth/2,
                zMin: z - bDepth/2, zMax: z + bDepth/2
            });
        }

        function createCity(offsetX, offsetZ) {
            const blockSize = 100;
            const streetWidth = 30;
            const step = blockSize + streetWidth;
            
            const cityRoadMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const cityRoad = new THREE.Mesh(new THREE.PlaneGeometry(900, 900), cityRoadMat);
            cityRoad.rotation.x = -Math.PI / 2;
            cityRoad.position.set(offsetX, 0.05, offsetZ);
            scene.add(cityRoad);
            
            const lineGeoV = new THREE.PlaneGeometry(1, 4);
            const lineGeoH = new THREE.PlaneGeometry(4, 1);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            for(let x = -390; x <= 390; x += step) {
                for(let z = -390; z <= 390; z += step) {
                    if (offsetX === 0 && Math.abs(x) < 60 && Math.abs(z) < 60) continue;
                    
                    const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x7f8c8d });
                    const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(blockSize, 0.2, blockSize), sidewalkMat);
                    sidewalk.position.set(x + offsetX, 0.1, z + offsetZ);
                    scene.add(sidewalk);
                    
                    const bSize = 35;
                    createBuilding(x + offsetX - 20, z + offsetZ - 20, bSize, bSize);
                    createBuilding(x + offsetX + 20, z + offsetZ - 20, bSize, bSize);
                    createBuilding(x + offsetX - 20, z + offsetZ + 20, bSize, bSize);
                    createBuilding(x + offsetX + 20, z + offsetZ + 20, bSize, bSize);
                }
            }
            
            for(let x = -390 - streetWidth/2; x <= 390 + streetWidth; x += step) {
                for(let z = -450; z <= 450; z += 12) {
                    const line = new THREE.Mesh(lineGeoV, lineMat);
                    line.rotation.x = -Math.PI / 2; line.position.set(x + offsetX, 0.06, z + offsetZ); scene.add(line);
                }
            }
            for(let z = -390 - streetWidth/2; z <= 390 + streetWidth; z += step) {
                for(let x = -450; x <= 450; x += 12) {
                    const line = new THREE.Mesh(lineGeoH, lineMat);
                    line.rotation.x = -Math.PI / 2; line.position.set(x + offsetX, 0.06, z + offsetZ); scene.add(line);
                }
            }
        }

        createCity(0, 0); 
        createCity(1600, 0); 

        // Oceano
        const oceanMat = new THREE.MeshStandardMaterial({ color: 0x0984e3, transparent: true, opacity: 0.85, roughness: 0.1 });
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(700, 6000), oceanMat);
        ocean.rotation.x = -Math.PI / 2; ocean.position.set(800, 0.1, 0); 
        scene.add(ocean);

        // A Grande Ponte Conectando as Duas Cidades
        const bridgeMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const bridge = new THREE.Mesh(new THREE.BoxGeometry(700, 1, 40), bridgeMat);
        bridge.position.set(800, 0.5, 0); // Corpo central no alto
        scene.add(bridge);
        
        // Rampa 1 (Sobe da Cidade 1)
        const ramp1 = new THREE.Mesh(new THREE.BoxGeometry(20.5, 1, 40), bridgeMat);
        ramp1.position.set(440, 0.5, 0);
        ramp1.rotation.z = Math.asin(1 / 20.5); 
        scene.add(ramp1);

        // Rampa 2 (Desce pra Cidade 2)
        const ramp2 = new THREE.Mesh(new THREE.BoxGeometry(20.5, 1, 40), bridgeMat);
        ramp2.position.set(1160, 0.5, 0);
        ramp2.rotation.z = -Math.asin(1 / 20.5); 
        scene.add(ramp2);
        
        // Linhas tracejadas na Ponte
        for(let x = 450; x <= 1150; x += 10) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(4, 1), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            line.rotation.x = -Math.PI / 2; line.position.set(x, 1.01, 0); scene.add(line);
        }

        // --- SISTEMA DE FUMAÇA (DRIFT) ---
        const smokeGeo = new THREE.SphereGeometry(0.8, 6, 6);
        function spawnDriftSmoke(x, z, y) {
            const smokeMat = new THREE.MeshBasicMaterial({ color: 0xdddddd, transparent: true, opacity: 0.4 });
            const puff = new THREE.Mesh(smokeGeo, smokeMat);
            puff.position.set(x + (Math.random() - 0.5), y + 0.4, z + (Math.random() - 0.5));
            scene.add(puff);
            driftSmokeParticles.push({ mesh: puff, life: 5.0 }); 
        }

        // --- CONSTRUÇÃO DE OBJETOS COM NOME E PERNAS ---
        function makeNameTag(name) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.roundRect(10, 10, 236, 44, 10); ctx.fill();
            ctx.fillStyle = 'white'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(name.toUpperCase(), canvas.width / 2, canvas.height / 2);
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(4, 1, 1); return sprite;
        }

        function createCarMesh(colorHex, playerName) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 4), new THREE.MeshStandardMaterial({ color: colorHex }));
            body.position.y = 0.5;
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 2), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            cabin.position.set(0, 0.9, -0.2);
            group.add(body, cabin);
            const tag = makeNameTag(playerName);
            tag.position.y = 2.0; group.add(tag);
            scene.add(group); return group;
        }

        function createHumanMesh(colorHex, playerName) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.7, 0.3), new THREE.MeshStandardMaterial({ color: colorHex }));
            body.position.y = 1.05;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshStandardMaterial({ color: 0xffdbac }));
            head.position.y = 1.6;
            
            const legMat = new THREE.MeshStandardMaterial({ color: 0x2233aa });
            const legL = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.28), legMat); legL.position.set(-0.15, 0.4, 0);
            const legR = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.28), legMat); legR.position.set(0.15, 0.4, 0);
            
            group.add(body, head, legL, legR);
            group.userData.legL = legL; group.userData.legR = legR;
            const tag = makeNameTag(playerName); tag.position.y = 2.5; group.add(tag);
            scene.add(group); return group;
        }

        // --- LÓGICA MULTIPLAYER ---
        function setStatus(msg) { document.getElementById('status-msg').innerText = msg; }

        function startGameEngine() {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            const topDisplay = document.getElementById('room-id-display');
            if (isHost) topDisplay.innerText = `ID DA SALA (HOST): ${myId}`;
            else topDisplay.innerText = `SALA: ${document.getElementById('room-id').value} (CONECTADO)`;
            topDisplay.style.display = 'block';
            
            players[myId] = {
                name: myName, color: myColor, isDriving: true,
                car: { x: 0, y: 0, z: 0, rotation: 0, targetX: 0, targetY: 0, targetZ: 0, targetRotation: 0 },
                human: { x: 0, y: 0, z: 0, rotation: 0, targetX: 0, targetY: 0, targetZ: 0, targetRotation: 0 },
                carMesh: createCarMesh(myColor, myName),
                humanMesh: createHumanMesh(myColor, myName)
            };
            players[myId].humanMesh.visible = false;
            
            requestAnimationFrame(animate);
        }

        function createRoom() {
            myName = document.getElementById('player-name').value || "Host";
            setStatus("Criando sala, aguarde...");
            peer = new Peer(); peer.on('disconnected', function() { peer.reconnect(); });
            peer.on('open', function(id) { myId = id; isHost = true; startGameEngine(); });
            peer.on('connection', function(conn) {
                clientConnections.push(conn);
                conn.on('data', function(data) {
                    if(data.type === 'join') {
                        players[data.id] = { 
                            name: data.name, color: data.color, isDriving: true,
                            car: { x: 0, y: 0, z: 0, rotation: 0, targetX: 0, targetY: 0, targetZ: 0, targetRotation: 0 },
                            human: { x: 0, y: 0, z: 0, rotation: 0, targetX: 0, targetY: 0, targetZ: 0, targetRotation: 0 },
                            carMesh: createCarMesh(data.color, data.name), humanMesh: createHumanMesh(data.color, data.name)
                        };
                        players[data.id].humanMesh.visible = false;
                    } 
                    else if (data.type === 'update') {
                        if(players[data.id]) {
                            let p = players[data.id]; p.isDriving = data.isDriving;
                            p.car.targetX = data.car.x; p.car.targetY = data.car.y; p.car.targetZ = data.car.z; p.car.targetRotation = data.car.rotation;
                            p.human.targetX = data.human.x; p.human.targetY = data.human.y; p.human.targetZ = data.human.z; p.human.targetRotation = data.human.rotation;
                        }
                    }
                });
                conn.on('close', function() {
                    clientConnections = clientConnections.filter(c => c.peer !== conn.peer);
                    if(players[conn.peer]) { scene.remove(players[conn.peer].carMesh); scene.remove(players[conn.peer].humanMesh); delete players[conn.peer]; }
                });
            });
        }

        function joinRoom() {
            const hostId = document.getElementById('room-id').value.trim();
            if(!hostId) return setStatus("Digite o ID!");
            myName = document.getElementById('player-name').value || "Convidado";
            setStatus("Conectando...");
            peer = new Peer(); peer.on('disconnected', function() { peer.reconnect(); });
            peer.on('open', function(id) {
                myId = id; hostConnection = peer.connect(hostId, { reliable: true });
                hostConnection.on('open', function() { setStatus("Conectado!"); hostConnection.send({ type: 'join', id: myId, name: myName, color: myColor }); startGameEngine(); });
                hostConnection.on('data', function(state) { if(state.type === 'stateUpdate') syncWorldState(state.playersData); });
                hostConnection.on('close', function() { alert("O Host fechou a sala!"); window.location.reload(); });
            });
            peer.on('error', function(err) { if (err.type === 'peer-unavailable') setStatus("Sala não encontrada."); else setStatus("Erro: " + err.type); });
        }

        function syncWorldState(serverPlayers) {
            for (let id in serverPlayers) {
                if (id === myId) continue;
                let sp = serverPlayers[id];
                if (!players[id]) {
                    players[id] = { 
                        name: sp.name, color: sp.color, isDriving: sp.isDriving,
                        car: { x: sp.car.x, y: sp.car.y, z: sp.car.z, rotation: sp.car.rotation, targetX: sp.car.x, targetY: sp.car.y, targetZ: sp.car.z, targetRotation: sp.car.rotation },
                        human: { x: sp.human.x, y: sp.human.y, z: sp.human.z, rotation: sp.human.rotation, targetX: sp.human.x, targetY: sp.human.y, targetZ: sp.human.z, targetRotation: sp.human.rotation },
                        carMesh: createCarMesh(sp.color, sp.name), humanMesh: createHumanMesh(sp.color, sp.name)
                    };
                    players[id].humanMesh.visible = !sp.isDriving;
                } else {
                    players[id].isDriving = sp.isDriving;
                    players[id].car.targetX = sp.car.x; players[id].car.targetY = sp.car.y; players[id].car.targetZ = sp.car.z; players[id].car.targetRotation = sp.car.rotation;
                    players[id].human.targetX = sp.human.x; players[id].human.targetY = sp.human.y; players[id].human.targetZ = sp.human.z; players[id].human.targetRotation = sp.human.rotation;
                }
            }
            for (let id in players) {
                if (id !== myId && !serverPlayers[id]) { scene.remove(players[id].carMesh); scene.remove(players[id].humanMesh); delete players[id]; }
            }
        }

        // --- ENTRADA E CONTROLES ---
        window.addEventListener('keydown', (e) => {
            if (!keys[e.code]) { 
                if (e.code === 'KeyF') {
                    if (myIsDriving) {
                        myIsDriving = false; 
                        myHumanX = myX + 2; 
                        myHumanZ = myZ; 
                        myHumanY = getFloorHeight(myHumanX, myHumanZ); 
                        myHumanRotation = myRotation;
                    } else {
                        let dist = Math.hypot(myHumanX - myX, myHumanZ - myZ);
                        if (dist < 4.0) myIsDriving = true;
                    }
                }
            }
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- FÍSICA AVANÇADA (COLISÃO, GRAVIDADE E DRIFT) ---
        function updatePhysics(dtMod) {
            let isTurning = keys['KeyA'] || keys['KeyD'] || keys['ArrowLeft'] || keys['ArrowRight'];
            let isHandbrake = keys['Space'];
            let isAccelerating = keys['KeyW'] || keys['ArrowUp'];
            let isReversing = keys['KeyS'] || keys['ArrowDown'];

            if (myIsDriving) {
                
                if (isAccelerating) {
                    mySpeed += 0.01 * dtMod;
                } else if (isReversing) {
                    mySpeed -= 0.01 * dtMod;
                } else if (!isHandbrake) {
                    mySpeed -= Math.sign(mySpeed) * 0.005 * dtMod;
                }
                
                if (isHandbrake) {
                    if (isAccelerating && Math.abs(mySpeed) > 0.2 && isTurning) {
                        mySpeed -= Math.sign(mySpeed) * 0.001 * dtMod;
                    } else {
                        mySpeed -= Math.sign(mySpeed) * 0.015 * dtMod; 
                    }
                    
                    // Somente solta fumaça de drift se o carro não estiver debaixo da água
                    if (myCarY >= 0 && Math.abs(mySpeed) > 0.2 && isTurning) {
                        let smokeX = myX - Math.sin(myRotation) * 1.5;
                        let smokeZ = myZ - Math.cos(myRotation) * 1.5;
                        spawnDriftSmoke(smokeX, smokeZ, myCarY);
                    }
                }

                if(Math.abs(mySpeed) < 0.006) mySpeed = 0;
                if(mySpeed > 0.8) mySpeed = 0.8;
                if(mySpeed < -0.4) mySpeed = -0.4;

                if (Math.abs(mySpeed) > 0) {
                    let mod = mySpeed > 0 ? 1 : -1;
                    let driftTurnBoost = (isHandbrake && Math.abs(mySpeed) > 0.2) ? 1.6 : 1.0;
                    if (keys['KeyA'] || keys['ArrowLeft']) myRotation += 0.03 * mod * driftTurnBoost * dtMod;
                    if (keys['KeyD'] || keys['ArrowRight']) myRotation -= 0.03 * mod * driftTurnBoost * dtMod;
                }

                // Cálculo de Colisão para X e Z do Carro
                let nextX = myX + Math.sin(myRotation) * mySpeed * dtMod;
                let nextZ = myZ + Math.cos(myRotation) * mySpeed * dtMod;
                
                if (checkCollision(nextX, nextZ, 1.2)) {
                    mySpeed = -mySpeed * 0.4; // Rebate ao bater no prédio
                } else {
                    myX = nextX;
                    myZ = nextZ;
                }

                // Cálculo da Gravidade e Altura (Ponte e Água) do Carro
                let floorY = getFloorHeight(myX, myZ);
                if (myCarY > floorY) {
                    myCarVelocityY -= 0.015 * dtMod; // Gravidade caindo
                }
                myCarY += myCarVelocityY * dtMod;
                
                if (myCarY <= floorY) { // Se tocou no chão/rampa/mar
                    myCarY = floorY;
                    myCarVelocityY = 0;
                }

                // Resistência se cair na água
                if (myCarY < -0.5) {
                    mySpeed *= 0.85; // Freio drástico na água
                    if(Math.abs(mySpeed) < 0.02) mySpeed = 0;
                }

            } else {
                mySpeed -= Math.sign(mySpeed) * 0.005 * dtMod;
                if(Math.abs(mySpeed) < 0.006) mySpeed = 0;
                
                // Controles a pé com colisão
                let walkSpd = 0.08 * dtMod;
                let nextHX = myHumanX;
                let nextHZ = myHumanZ;
                
                if (keys['KeyW'] || keys['ArrowUp']) { nextHX += Math.sin(myHumanRotation) * walkSpd; nextHZ += Math.cos(myHumanRotation) * walkSpd; }
                if (keys['KeyS'] || keys['ArrowDown']) { nextHX -= Math.sin(myHumanRotation) * walkSpd; nextHZ -= Math.cos(myHumanRotation) * walkSpd; }
                if (keys['KeyA'] || keys['ArrowLeft']) myHumanRotation += 0.05 * dtMod;
                if (keys['KeyD'] || keys['ArrowRight']) myHumanRotation -= 0.05 * dtMod;

                if (!checkCollision(nextHX, nextHZ, 0.4)) {
                    myHumanX = nextHX;
                    myHumanZ = nextHZ;
                }

                // PULO, PONTE E ÁGUA PARA O BONECO
                let hFloorY = getFloorHeight(myHumanX, myHumanZ);
                if (isHandbrake && myHumanY <= hFloorY) {
                    myHumanVelocityY = 0.25; 
                }
                
                myHumanY += myHumanVelocityY * dtMod;
                myHumanVelocityY -= 0.015 * dtMod; 
                if (myHumanY <= hFloorY) { 
                    myHumanY = hFloorY; 
                    myHumanVelocityY = 0; 
                }
            }

            // O carro vazio também pode afundar ou bater
            if (!myIsDriving) {
                let emptyCarFloorY = getFloorHeight(myX, myZ);
                if (myCarY > emptyCarFloorY) {
                    myCarVelocityY -= 0.015 * dtMod; 
                }
                myCarY += myCarVelocityY * dtMod;
                if (myCarY <= emptyCarFloorY) {
                    myCarY = emptyCarFloorY;
                    myCarVelocityY = 0;
                }
                myX += Math.sin(myRotation) * mySpeed * dtMod;
                myZ += Math.cos(myRotation) * mySpeed * dtMod;
            }

            document.getElementById('speed').innerText = Math.floor(Math.abs(mySpeed) * 300);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            if (!lastFrameTime) lastFrameTime = time;
            let deltaTime = (time - lastFrameTime) / 1000;
            lastFrameTime = time;
            if (deltaTime > 0.1) deltaTime = 0.1; 
            let dtMod = deltaTime * 60; 

            updatePhysics(dtMod);
            let timeSec = time / 1000;

            // ATUALIZA FUMAÇA DO DRIFT
            for(let i = driftSmokeParticles.length - 1; i >= 0; i--) {
                let p = driftSmokeParticles[i];
                p.life -= deltaTime;
                p.mesh.position.y += 0.6 * deltaTime;
                p.mesh.scale.multiplyScalar(1.02);
                p.mesh.material.opacity = (p.life / 5.0) * 0.4;
                if(p.life <= 0) { scene.remove(p.mesh); driftSmokeParticles.splice(i, 1); }
            }

            for (let id in players) {
                let p = players[id];
                if (!p.carMesh) continue;

                if (id === myId) {
                    p.carMesh.position.set(myX, myCarY, myZ); 
                    p.carMesh.rotation.y = myRotation;
                    
                    p.humanMesh.position.set(myHumanX, myHumanY, myHumanZ); 
                    p.humanMesh.rotation.y = myHumanRotation;
                    
                    p.humanMesh.visible = !myIsDriving;

                    let moving = !myIsDriving && (keys['KeyW'] || keys['KeyS'] || keys['ArrowUp'] || keys['ArrowDown']);
                    let hFloorY = getFloorHeight(myHumanX, myHumanZ);
                    if(moving && myHumanY <= hFloorY) {
                        p.humanMesh.userData.legL.rotation.x = Math.sin(timeSec * 15) * 0.5;
                        p.humanMesh.userData.legR.rotation.x = -Math.sin(timeSec * 15) * 0.5;
                    } else {
                        p.humanMesh.userData.legL.rotation.x = 0;
                        p.humanMesh.userData.legR.rotation.x = 0;
                    }
                } else {
                    p.car.x += (p.car.targetX - p.car.x) * 0.2 * dtMod; 
                    p.car.y += (p.car.targetY - p.car.y) * 0.2 * dtMod; 
                    p.car.z += (p.car.targetZ - p.car.z) * 0.2 * dtMod;
                    let diffCar = p.car.targetRotation - p.car.rotation;
                    while (diffCar < -Math.PI) diffCar += Math.PI * 2; while (diffCar > Math.PI) diffCar -= Math.PI * 2;
                    p.car.rotation += diffCar * 0.2 * dtMod;
                    p.carMesh.position.set(p.car.x, p.car.y, p.car.z); 
                    p.carMesh.rotation.y = p.car.rotation;

                    let oldX = p.human.x; let oldZ = p.human.z;
                    p.human.x += (p.human.targetX - p.human.x) * 0.2 * dtMod; 
                    p.human.y += (p.human.targetY - p.human.y) * 0.3 * dtMod; 
                    p.human.z += (p.human.targetZ - p.human.z) * 0.2 * dtMod;
                    
                    let diffHum = p.human.targetRotation - p.human.rotation;
                    while (diffHum < -Math.PI) diffHum += Math.PI * 2; while (diffHum > Math.PI) diffHum -= Math.PI * 2;
                    p.human.rotation += diffHum * 0.2 * dtMod;
                    p.humanMesh.position.set(p.human.x, p.human.y, p.human.z); 
                    p.humanMesh.rotation.y = p.human.rotation;
                    p.humanMesh.visible = !p.isDriving;

                    let isMovingRemotely = Math.abs(p.human.x - oldX) > 0.01 || Math.abs(p.human.z - oldZ) > 0.01;
                    let theirFloorY = getFloorHeight(p.human.x, p.human.z);
                    if(!p.isDriving && isMovingRemotely && p.human.y <= theirFloorY + 0.2) {
                        p.humanMesh.userData.legL.rotation.x = Math.sin(timeSec * 15) * 0.5;
                        p.humanMesh.userData.legR.rotation.x = -Math.sin(timeSec * 15) * 0.5;
                    } else {
                        p.humanMesh.userData.legL.rotation.x = 0; p.humanMesh.userData.legR.rotation.x = 0;
                    }
                }
            }

            if(players[myId]) {
                if (myIsDriving) {
                    const myCar = players[myId].carMesh;
                    const offset = new THREE.Vector3(-Math.sin(myRotation) * 12, 6, -Math.cos(myRotation) * 12);
                    camera.position.copy(myCar.position).add(offset); camera.lookAt(myCar.position);
                } else {
                    const myBody = players[myId].humanMesh;
                    const offset = new THREE.Vector3(-Math.sin(myHumanRotation) * 6, 4, -Math.cos(myHumanRotation) * 6);
                    camera.position.copy(myBody.position).add(offset); camera.lookAt(myBody.position.clone().add(new THREE.Vector3(0, 1, 0)));
                }
            }

            if (time - lastNetworkSend > NETWORK_TICK_RATE) {
                lastNetworkSend = time;
                if (isHost) {
                    let statePayload = {};
                    for(let id in players) {
                        let p = players[id];
                        statePayload[id] = { 
                            name: p.name, color: p.color, isDriving: p.isDriving,
                            car: { x: (id === myId) ? myX : p.car.targetX, y: (id === myId) ? myCarY : p.car.targetY, z: (id === myId) ? myZ : p.car.targetZ, rotation: (id === myId) ? myRotation : p.car.targetRotation },
                            human: { x: (id === myId) ? myHumanX : p.human.targetX, y: (id === myId) ? myHumanY : p.human.targetY, z: (id === myId) ? myHumanZ : p.human.targetZ, rotation: (id === myId) ? myHumanRotation : p.human.targetRotation }
                        };
                    }
                    clientConnections.forEach(conn => { if(conn.open) conn.send({ type: 'stateUpdate', playersData: statePayload }); });
                } else if (hostConnection && hostConnection.open) {
                    hostConnection.send({ type: 'update', id: myId, isDriving: myIsDriving, car: { x: myX, y: myCarY, z: myZ, rotation: myRotation }, human: { x: myHumanX, y: myHumanY, z: myHumanZ, rotation: myHumanRotation } });
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
